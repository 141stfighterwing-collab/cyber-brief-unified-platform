# ─── Cyber Brief Unified Platform — Docker Compose (Development) ───
#
# Usage:
#   docker compose -f docker-compose.dev.yml up
#   docker compose -f docker-compose.dev.yml up --build
#   docker compose -f docker-compose.dev.yml down

services:
  cbup-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: cyber-brief-up-dev
    restart: no
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      # Mount source code for hot reload
      - ./src:/app/src
      - ./public:/app/public
      - ./prisma:/app/prisma
      - cbup-dev-data:/app/data
    environment:
      - DATABASE_URL=file:/app/data/cbup.db
      - NODE_ENV=development
      - PORT=3000
      - HOSTNAME=0.0.0.0
    stdin_open: true
    tty: true

volumes:
  cbup-dev-data:
    driver: local
    name: cbup-dev-data
