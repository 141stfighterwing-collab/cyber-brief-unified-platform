# ─── Cyber Brief Unified Platform — Docker Compose (Production — SQLite) ───
#
# Default database: SQLite (file-based, zero config)
#
# Quick start:
#   docker compose up -d
#
# Custom port:
#   PORT=8080 docker compose up -d
#
# Rebuild after changes:
#   docker compose up -d --build
#
# View logs:
#   docker compose logs -f
#
# Stop:
#   docker compose down
#
# Full reset (including database):
#   docker compose down -v
#
# ── Multi-DB alternatives ──
#   MySQL:      docker compose -f docker-compose.mysql.yml up -d
#   PostgreSQL: docker compose -f docker-compose.postgresql.yml up -d
#   MongoDB:    docker compose -f docker-compose.mongodb.yml up -d
#   SQL Server: docker compose -f docker-compose.mssql.yml up -d

services:
  cbup:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cyber-brief-up
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - cbup-data:/app/data
      - cbup-logs:/app/logs
    environment:
      - DATABASE_PROVIDER=sqlite
      - DATABASE_URL=file:/app/data/cbup.db
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
      start_interval: 5s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  cbup-data:
    driver: local
    name: cbup-data
  cbup-logs:
    driver: local
    name: cbup-logs
