# ─── Cyber Brief Unified Platform — Docker Compose (MongoDB) ───
#
# Usage:
#   docker compose -f docker-compose.mongodb.yml up -d
#   docker compose -f docker-compose.mongodb.yml up -d --build
#   docker compose -f docker-compose.mongodb.yml logs -f
#   docker compose -f docker-compose.mongodb.yml down
#   docker compose -f docker-compose.mongodb.yml down -v
#
# Mongo Express: http://localhost:8083 (admin / admin2025)

services:
  cbup:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cbup-mongodb
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - DATABASE_PROVIDER=mongodb
      - DATABASE_URL=mongodb://cbup:cbup_secure_2025@mongodb:27017/cbup
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - cbup-data:/app/data
      - cbup-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/db-status"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  mongodb:
    image: mongo:7
    container_name: cbup-mongodb-db
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=cbup
      - MONGO_INITDB_ROOT_PASSWORD=cbup_secure_2025
      - MONGO_INITDB_DATABASE=cbup
    volumes:
      - mongodb-data:/data/db
    ports:
      - "${DB_PORT:-27017}:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: --auth

  mongo-express:
    image: mongo-express:latest
    container_name: cbup-mongo-express
    restart: unless-stopped
    ports:
      - "${ME_PORT:-8083}:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=cbup
      - ME_CONFIG_MONGODB_ADMINPASSWORD=cbup_secure_2025
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=admin2025
    depends_on:
      - mongodb

volumes:
  cbup-data:
  cbup-logs:
  mongodb-data:
