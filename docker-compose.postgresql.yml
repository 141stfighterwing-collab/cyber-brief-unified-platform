# ─── Cyber Brief Unified Platform — Docker Compose (PostgreSQL) ───
#
# Usage:
#   docker compose -f docker-compose.postgresql.yml up -d
#   docker compose -f docker-compose.postgresql.yml up -d --build
#   docker compose -f docker-compose.postgresql.yml logs -f
#   docker compose -f docker-compose.postgresql.yml down
#   docker compose -f docker-compose.postgresql.yml down -v
#
# pgAdmin: http://localhost:8082 (admin@cbup.local / admin_secure_2025)

services:
  cbup:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cbup-postgres
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - DATABASE_PROVIDER=postgresql
      - DATABASE_URL=postgresql://cbup:cbup_secure_2025@postgres:5432/cbup
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - cbup-data:/app/data
      - cbup-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/db-status"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  postgres:
    image: postgres:16-alpine
    container_name: cbup-postgres-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=cbup
      - POSTGRES_USER=cbup
      - POSTGRES_PASSWORD=cbup_secure_2025
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cbup -d cbup"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cbup-pgadmin
    restart: unless-stopped
    ports:
      - "${PGA_PORT:-8082}:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@cbup.local
      - PGADMIN_DEFAULT_PASSWORD=admin_secure_2025
    depends_on:
      - postgres

volumes:
  cbup-data:
  cbup-logs:
  postgres-data:
