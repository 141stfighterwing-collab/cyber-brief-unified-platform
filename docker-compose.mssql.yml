# ─── Cyber Brief Unified Platform — Docker Compose (SQL Server) ───
#
# Usage:
#   docker compose -f docker-compose.mssql.yml up -d
#   docker compose -f docker-compose.mssql.yml up -d --build
#   docker compose -f docker-compose.mssql.yml logs -f
#   docker compose -f docker-compose.mssql.yml down
#   docker compose -f docker-compose.mssql.yml down -v
#
# SQL Server connection: localhost:1433 (sa / Strong_Passw0rd_2025)

services:
  cbup:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cbup-mssql
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - DATABASE_PROVIDER=mssql
      - DATABASE_URL=mssql://sa:Strong_Passw0rd_2025@mssql:1433/cbup
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    depends_on:
      mssql:
        condition: service_healthy
    volumes:
      - cbup-data:/app/data
      - cbup-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/db-status"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: cbup-mssql-db
    restart: unless-stopped
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Strong_Passw0rd_2025
      - MSSQL_PID=Express
    volumes:
      - mssql-data:/var/opt/mssql
    ports:
      - "${DB_PORT:-1433}:1433"
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "Strong_Passw0rd_2025", "-C", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  cbup-data:
  cbup-logs:
  mssql-data:
